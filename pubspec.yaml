name: doc_scanner
description: "A document scanner app - scan papers, auto-crop, enhance, export PDF"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # Camera
  camera: ^0.11.0+2

  # Image processing
  image: ^4.3.0

  # PDF generation
  pdf: ^3.11.1
  printing: ^5.13.3

  # Local storage
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.0

  # Sharing
  share_plus: ^10.1.4
  cross_file: ^0.3.4+2

  # UI
  cupertino_icons: ^1.0.8
  provider: ^6.1.2

  # Permissions
  permission_handler: ^11.3.1

  # File picker for import
  file_picker: ^8.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
